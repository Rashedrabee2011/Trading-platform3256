version: '3.8'
services:
  app:
    build: .
    ports:
      - "4242:4242"
    depends_on:
      - redis
    environment:
      - NODE_ENV=production
      - PORT=4242
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./:/usr/src/app
  redis:
    image: redis:7-alpine
    restart: unless-stopped
